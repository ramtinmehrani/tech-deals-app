name: Update Tech Deals

on:
  schedule:
    - cron: '0 0,12 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push Updated JSON
        run: |
          git config --global user.name "DealBot"
          git config --global user.email "bot@techdeals.com"
          git add deals.json
          git commit -m "Automated live deals update" || exit 0
          git push
